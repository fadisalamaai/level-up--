name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # تأكد أن هذا هو اسم الفرع الرئيسي لديك

# هذا الجزء يمنع تداخل العمليات ويحل مشكلة تعدد الـ artifacts
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps:deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # تأكد أن مجلد 'level bar' موجود فعلاً في جذر المشروع
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './level bar'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
